<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sultan Tap Tap Royale V17</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <style>
        :root { --bg: #05070a; --card: rgba(17, 20, 29, 0.98); --accent: #00ff88; --gold: #f1c40f; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; overflow-x: hidden; user-select: none; touch-action: manipulation; }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
        .header { background: #1a1c2c; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #333; }
        #money { font-size: 35px; color: var(--accent); font-weight: 900; text-shadow: 0 0 10px var(--accent); margin: 5px 0; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #444; width: 80%; max-width: 300px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #main-target { width: 130px; height: 130px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 70px; border: 6px solid #fff; box-shadow: 0 0 20px var(--gold); cursor: pointer; transition: transform 0.05s; background: radial-gradient(circle, var(--gold), #b8860b); }
        #main-target:active { transform: scale(0.9); }
        .container { padding: 10px; max-width: 500px; margin: auto; padding-bottom: 120px; }
        .tabs { display: flex; background: #161925; border-bottom: 2px solid #333; }
        .tab { flex: 1; padding: 15px; cursor: pointer; color: #777; font-weight: bold; font-size: 11px; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(0,255,136,0.05); }
        .item { background: var(--card); margin: 8px 0; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .tier-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; text-transform: uppercase; }

        /* --- SPIN RE-DESIGN V17 --- */
        #wheel-wrapper { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #wheel { 
            width: 100%; height: 100%; border: 8px solid #fff; border-radius: 50%; 
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); 
            background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #f1c40f 270deg 360deg); 
            position: relative; overflow: hidden;
        }
        .wheel-section {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 35px; box-sizing: border-box;
        }
        .wheel-section span {
            font-weight: 900; font-size: 14px; color: #fff;
            text-shadow: 2px 2px 4px #000; transform: rotate(0deg);
        }
        #wheel-pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #fff; position: absolute; top: -10px; left: 50%; transform:translateX(-50%); z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        
        button { padding: 10px 15px; background: #3498db; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="auth-box" class="modal">
        <div class="auth-card">
            <h2 style="color:var(--gold)">SULTAN LOGIN</h2>
            <input type="text" id="username-input" placeholder="Nama Akun...">
            <input type="password" id="password-input" placeholder="Password...">
            <button onclick="login()" style="width:100%; background:var(--accent); color:#000; padding:15px; font-weight:bold;">MULAI MAIN</button>
        </div>
    </div>
    <div class="header">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <div>Name: <span id="user-display">-</span> <span id="tier-display" class="tier-badge"></span></div>
            <span onclick="localStorage.clear(); location.reload();" style="color:var(--accent); cursor:pointer;">Reset</span>
        </div>
        <div id="money">0</div>
        <div style="font-size:11px; color:#aaa;">RB: <span id="rb-display">0</span> | Multi: <span id="multi-display">1.0</span>x</div>
    </div>
    <div id="main-target">💰</div>
    <div class="tabs">
        <div id="t-shop" class="tab active" onclick="showPage('shop')">BISNIS</div>
        <div id="t-rank" class="tab" onclick="showPage('rank')">RANK</div>
        <div id="t-spin" class="tab" onclick="showPage('spin')">SPIN</div>
        <div id="t-rb" class="tab" onclick="showPage('rb')">REBIRTH</div>
    </div>
    <div class="container">
        <div id="page-shop"><div id="shop-list"></div></div>
        <div id="page-rank" style="display:none">
            <h3 style="color:var(--gold)">TIER LIST SULTAN</h3>
            <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid #333; text-align:left;">
                <p>Status: <b id="r-tier">BRONZE</b></p>
                <p>Total Duit: Rp<span id="r-money">0</span></p>
                <hr style="border:0.5px solid #333">
                <small style="color:#888;">
                    Bronze: 0 - 1K | Silver: 1K - 10K | Gold: 10K - 100K<br>Platinum: 100K - 1M | Diamond: 1M - 10M<br>Master: 10M - 100M | GM: > 100M
                </small>
            </div>
        </div>
        <div id="page-spin" style="display:none">
            <div id="wheel-wrapper">
                <div id="wheel-pointer"></div>
                <div id="wheel">
                    <div class="wheel-section" style="transform: rotate(45deg);"><span>5.000</span></div>
                    <div class="wheel-section" style="transform: rotate(135deg);"><span>10.000</span></div>
                    <div class="wheel-section" style="transform: rotate(225deg);"><span>20.000</span></div>
                    <div class="wheel-section" style="transform: rotate(315deg);"><span>BOOST 2X</span></div>
                </div>
            </div>
            <button id="spin-btn" onclick="spinWheel()" style="margin-top:10px; background:var(--gold); color:#000; padding:15px; width:220px; font-weight:900; border-radius:50px;">PUTAR SPIN</button>
        </div>
        <div id="page-rb" style="display:none"><div style="background:rgba(241,196,15,0.1); padding:20px; border-radius:15px; border:1px solid var(--gold);"><h3>REBIRTH</h3><button id="rb-btn" onclick="doRebirth()" style="background:var(--gold); color:#000; width:100%; padding:15px;">RESET & POWER UP</button></div></div>
    </div>
    <script>
        let game = { user: "", pass: "", money: 0, mps: 0, multi: 1.0, rb: 0, lastSpin: 0 };
        const baseUpgrades = [
            { n: "Gerobak Gorengan", p: 15, g: 1 }, { n: "Ojek Pengkolan", p: 100, g: 8 }, { n: "Warung Madura", p: 1000, g: 70 },
            { n: "Cafe Sultan", p: 10000, g: 800 }, { n: "Showroom Mobil", p: 100000, g: 9500 }, { n: "Pabrik Uang", p: 1000000, g: 110000 }
        ];
        let upgrades = JSON.parse(JSON.stringify(baseUpgrades)).map(u => ({...u, c: 0}));

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle { constructor(x, y) { this.x = x; this.y = y; this.vX = (Math.random()-0.5)*8; this.vY = (Math.random()-0.5)*8-5; this.life = 1; } update() { this.x += this.vX; this.y += this.vY; this.vY += 0.4; this.life -= 0.02; } draw() { ctx.fillStyle = `rgba(241, 196, 15, ${this.life})`; ctx.font = "16px serif"; ctx.fillText("🪙", this.x, this.y); } }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles = particles.filter(p => p.life > 0); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();

        function getTier(m) {
            if(m < 1000) return {n:"Bronze", c:"#cd7f32"};
            if(m < 10000) return {n:"Silver", c:"#c0c0c0"};
            if(m < 100000) return {n:"Gold", c:"#ffd700"};
            if(m < 1000000) return {n:"Platinum", c:"#e5e4e2"};
            if(m < 10000000) return {n:"Diamond", c:"#b9f2ff"};
            if(m < 100000000) return {n:"Master", c:"#ff00ff"};
            return {n:"Grandmaster", c:"#ff0000"};
        }

        function login() {
            let n = document.getElementById('username-input').value.trim();
            let p = document.getElementById('password-input').value.trim();
            if(!n || !p) return alert("Isi data!");
            let saved = null;
            for(let i=11; i<=17; i++) {
                let check = localStorage.getItem('sultan_v' + i + '_' + n);
                if(check) { saved = check; break; }
            }
            if(saved) {
                let d = JSON.parse(saved);
                if(d.game.pass !== p) return alert("Salah Password!");
                game = d.game; upgrades = d.upgrades;
            } else { game.user = n; game.pass = p; }
            document.getElementById('auth-box').style.display = 'none';
            updateUI(); renderShop(); startLoop();
        }

        function renderShop() {
            let html = "";
            upgrades.forEach((u, i) => {
                html += `<div class="item"><div class="item-info"><strong>${u.n} (${u.c})</strong><small>+${Math.floor(u.g*game.multi).toLocaleString()}/s</small></div><button id="b${i}" onclick="buy(${i})">Rp${u.p.toLocaleString()}</button></div>`;
            });
            document.getElementById('shop-list').innerHTML = html;
        }

        function buy(i) {
            if(game.money >= upgrades[i].p) {
                game.money -= upgrades[i].p; upgrades[i].c++; game.mps += upgrades[i].g;
                upgrades[i].p = Math.floor(upgrades[i].p * 1.5);
                renderShop(); refresh(); saveGame();
            }
        }

        function hit(e) {
            game.money += (1 * game.multi);
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 200));
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 200));
            for(let i=0; i<3; i++) particles.push(new Particle(x, y));
            refresh();
        }

        function spinWheel() {
            if(Date.now() - game.lastSpin < 86400000) return alert("Besok lagi!");
            let randomAdd = Math.floor(Math.random() * 360);
            let totalDeg = 3600 + randomAdd;
            document.getElementById('wheel').style.transform = `rotate(${totalDeg}deg)`;
            document.getElementById('spin-btn').disabled = true;
            setTimeout(() => {
                let finalPos = (360 - (randomAdd % 360)) % 360;
                let prize = "";
                if (finalPos < 90) { game.money += 5000; prize = "5.000"; }
                else if (finalPos < 180) { game.multi += 2; prize = "BOOST 2X"; }
                else if (finalPos < 270) { game.money += 20000; prize = "20.000"; }
                else { game.money += 10000; prize = "10.000"; }
                alert("HOKI! Dapet: " + prize); game.lastSpin = Date.now();
                document.getElementById('spin-btn').disabled = false;
                refresh(); saveGame();
            }, 4000);
        }

        function showPage(p) {
            ['shop','rank','spin','rb'].forEach(pg => {
                document.getElementById('page-'+pg).style.display = (pg === p) ? 'block' : 'none';
                document.getElementById('t-'+pg).classList.remove('active');
            });
            document.getElementById('t-'+p).classList.add('active');
            if(p === 'rank') { 
                let t = getTier(game.money);
                document.getElementById('r-tier').innerText = t.n;
                document.getElementById('r-tier').style.color = t.c;
                document.getElementById('r-money').innerText = Math.floor(game.money).toLocaleString();
            }
        }

        function refresh() {
            document.getElementById('money').innerText = Math.floor(game.money).toLocaleString();
            document.getElementById('multi-display').innerText = game.multi.toFixed(1);
            document.getElementById('rb-display').innerText = game.rb;
            let t = getTier(game.money);
            document.getElementById('tier-display').innerText = t.n;
            document.getElementById('tier-display').style.background = t.c;
            document.getElementById('tier-display').style.color = (t.n === "Gold" || t.n === "Diamond" || t.n === "Silver") ? "#000" : "#fff";
            upgrades.forEach((u,i) => { let b = document.getElementById('b'+i); if(b) b.disabled = game.money < u.p; });
        }
        function updateUI() { document.getElementById('user-display').innerText = game.user; refresh(); }
        function saveGame() { if(game.user) localStorage.setItem('sultan_v17_' + game.user, JSON.stringify({game, upgrades})); }
        function startLoop() { setInterval(() => { game.money += (game.mps * game.multi) / 10; refresh(); }, 100); setInterval(saveGame, 5000); }
        document.getElementById('main-target').addEventListener('pointerdown', hit);
    </script>
</body>
</html>
