<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="title-tag">TOMODACHI TAP V22</title>
    <style>
        :root { --bg: #0b0e14; --card: rgba(22, 26, 37, 0.98); --accent: #00ff88; --gold: #f1c40f; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; overflow-x: hidden; user-select: none; touch-action: manipulation; }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
        .header { background: #1a1c2c; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #333; }
        #money { font-size: 35px; color: var(--accent); font-weight: 900; text-shadow: 0 0 10px var(--accent); margin: 5px 0; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #444; width: 80%; max-width: 300px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #main-target { width: 130px; height: 130px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 70px; border: 6px solid #fff; box-shadow: 0 0 20px var(--gold); cursor: pointer; transition: transform 0.05s; background: radial-gradient(circle, var(--gold), #b8860b); }
        #main-target:active { transform: scale(0.9); }
        .container { padding: 10px; max-width: 500px; margin: auto; padding-bottom: 120px; }
        .tabs { display: flex; background: #161925; border-bottom: 2px solid #333; }
        .tab { flex: 1; padding: 15px; cursor: pointer; color: #777; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(0,255,136,0.05); }
        .item { background: var(--card); margin: 8px 0; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        button { padding: 10px 15px; background: #3498db; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #222 !important; color: #555 !important; cursor: not-allowed; }
        #audio-ctrl { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; font-size: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <audio id="bgm" loop>
        <source src="https://files.catbox.moe/p9o486.mp3" type="audio/mpeg">
    </audio>

    <div id="auth-box" class="modal">
        <div class="auth-card">
            <h2 id="login-title" style="color:var(--gold)">USER LOGIN</h2>
            <input type="text" id="username-input" placeholder="Nama Akun...">
            <input type="password" id="password-input" placeholder="Password...">
            <button onclick="login()" style="width:100%; background:var(--accent); color:#000; padding:15px; font-weight:bold;">MULAI MAIN</button>
        </div>
    </div>

    <div id="audio-ctrl" onclick="toggleAudio()">🎵 Music: OFF</div>

    <div class="header">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <div><span id="user-display">-</span> <span id="tier-display" style="padding:2px 5px; border-radius:3px; font-size:10px;"></span></div>
            <span onclick="localStorage.clear(); location.reload();" style="color:#ff4444; cursor:pointer;">Reset All</span>
        </div>
        <div id="money">0</div>
        <div style="font-size:11px; color:#aaa;">RB: <span id="rb-display">0</span> | Multi: <span id="multi-display">1.0</span>x</div>
    </div>

    <div id="main-target">💰</div>

    <div class="tabs">
        <div id="t-shop" class="tab active" onclick="showPage('shop')">BISNIS</div>
        <div id="t-rank" class="tab" onclick="showPage('rank')">RANK</div>
        <div id="t-spin" class="tab" onclick="showPage('spin')">SPIN</div>
        <div id="t-rb" class="tab" onclick="showPage('rb')">REBIRTH</div>
    </div>

    <div class="container">
        <div id="page-shop"><div id="shop-list"></div></div>
        <div id="page-rank" style="display:none">
            <h3 id="rank-title">RANK</h3>
            <div id="rank-card" style="background:var(--card); padding:20px; border-radius:15px; border:1px solid #333; text-align:left;">
                <p>Status: <b id="r-tier">BRONZE</b></p>
                <p>Total Duit: Rp<span id="r-money">0</span></p>
            </div>
        </div>
        <div id="page-spin" style="display:none">
            <div id="wheel-wrapper" style="position:relative; width:250px; height:250px; margin:auto;">
                <div style="width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-top:20px solid #fff; position:absolute; top:-5px; left:50%; transform:translateX(-50%); z-index:10;"></div>
                <div id="wheel" style="width:100%; height:100%; border-radius:50%; border:5px solid #fff; transition:4s cubic-bezier(0.1,0,0.1,1); background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #f1c40f 270deg 360deg);"></div>
            </div>
            <button id="spin-btn" onclick="spinWheel()" style="margin-top:20px; background:var(--gold); color:#000; width:200px; border-radius:50px;">SPIN SEKARANG</button>
        </div>
        <div id="page-rb" style="display:none">
            <div style="padding:20px; border:2px solid var(--gold); border-radius:15px;">
                <h3 id="rb-title">REBIRTH</h3>
                <p>Minimal: <b>Rp100.000.000</b></p>
                <button id="rb-btn" onclick="doRebirth()" style="width:100%; background:var(--gold); color:#000;">REBIRTH</button>
            </div>
        </div>
    </div>

    <script>
        let game = { user: "", pass: "", money: 0, mps: 0, multi: 1.0, rb: 0, lastSpin: 0 };
        const baseUpgrades = [
            { n: "Gerobak Gorengan", p: 15, g: 1 }, { n: "Ojek Pengkolan", p: 100, g: 8 }, { n: "Warung Madura", p: 1000, g: 70 },
            { n: "Cafe Sultan", p: 10000, g: 800 }, { n: "Showroom Mobil", p: 100000, g: 9500 }, { n: "Pabrik Uang", p: 1000000, g: 110000 },
            { n: "Klub Bola", p: 10000000, g: 1500000 }, { n: "Bitcoin Mine", p: 100000000, g: 20000000 }, { n: "Mars Colony", p: 1000000000, g: 300000000 }
        ];
        let upgrades = JSON.parse(JSON.stringify(baseUpgrades)).map(u => ({...u, c: 0}));

        const bgm = document.getElementById('bgm');
        
        function toggleAudio() {
            if(bgm.paused) { bgm.play(); document.getElementById('audio-ctrl').innerText = "🎵 Music: ON"; }
            else { bgm.pause(); document.getElementById('audio-ctrl').innerText = "🎵 Music: OFF"; }
        }

        function login() {
            let n = document.getElementById('username-input').value.trim().toUpperCase();
            let p = document.getElementById('password-input').value.trim();
            if(!n || !p) return alert("Isi nama & password!");

            // RECOVERY SYSTEM: Cek semua versi lama
            let foundData = null;
            for(let i=11; i<=22; i++) {
                let check = localStorage.getItem('sultan_v' + i + '_' + n);
                if(check) { foundData = JSON.parse(check); break; }
            }

            if(foundData) {
                if(foundData.game.pass !== p) return alert("Password salah!");
                game = foundData.game;
                upgrades = foundData.upgrades;
            } else {
                game.user = n; game.pass = p;
            }

            document.getElementById('auth-box').style.display = 'none';
            bgm.volume = 0.4;
            bgm.play().then(() => document.getElementById('audio-ctrl').innerText = "🎵 Music: ON").catch(() => {});
            
            updateBranding();
            renderShop();
            startLoop();
        }

        function updateBranding() {
            const u = game.user || "USER";
            document.getElementById('title-tag').innerText = u + " LIFE";
            document.getElementById('login-title').innerText = u + " LOGIN";
            document.getElementById('rank-title').innerText = "RANK " + u;
            document.getElementById('rb-title').innerText = u + " REBIRTH";
            document.getElementById('user-display').innerText = u;
        }

        function renderShop() {
            let html = "";
            upgrades.forEach((u, i) => {
                html += `<div class="item"><div><b>${u.n}</b> (${u.c})<br><small>+${Math.floor(u.g*game.multi).toLocaleString()}/s</small></div><button id="b${i}" onclick="buy(${i})">Rp${u.p.toLocaleString()}</button></div>`;
            });
            document.getElementById('shop-list').innerHTML = html;
        }

        function buy(i) {
            if(game.money >= upgrades[i].p) {
                game.money -= upgrades[i].p; upgrades[i].c++;
                game.mps = upgrades.reduce((acc, curr) => acc + (curr.c * curr.g), 0);
                upgrades[i].p = Math.floor(upgrades[i].p * 1.5);
                renderShop(); refresh(); saveGame();
            }
        }

        function spinWheel() {
            if(Date.now() - game.lastSpin < 86400000) return alert("Tunggu besok!");
            let r = Math.floor(Math.random() * 360);
            document.getElementById('wheel').style.transform = `rotate(${3600 + r}deg)`;
            document.getElementById('spin-btn').disabled = true;
            setTimeout(() => {
                let f = (360 - (r % 360)) % 360;
                let prize = "";
                if(f < 90) { game.money += 5000; prize = "Rp5.000"; }
                else if(f < 180) { game.money += 10000; prize = "Rp10.000"; }
                else if(f < 270) { game.money += 20000; prize = "Rp20.000"; }
                else { game.multi += 2; prize = "BOOST 2X"; }
                alert("Dapet: " + prize);
                game.lastSpin = Date.now();
                document.getElementById('spin-btn').disabled = false;
                refresh(); saveGame();
            }, 4000);
        }

        function refresh() {
            document.getElementById('money').innerText = Math.floor(game.money).toLocaleString();
            document.getElementById('multi-display').innerText = game.multi.toFixed(1);
            document.getElementById('rb-display').innerText = game.rb;
            document.getElementById('rb-btn').disabled = (game.money < 100000000);
            upgrades.forEach((u,i) => {
                let btn = document.getElementById('b'+i);
                if(btn) btn.disabled = (game.money < u.p);
            });
        }

        function saveGame() { if(game.user) localStorage.setItem('sultan_v22_' + game.user, JSON.stringify({game, upgrades})); }
        function startLoop() { setInterval(() => { game.money += (game.mps * game.multi)/10; refresh(); }, 100); setInterval(saveGame, 5000); }
        document.getElementById('main-target').addEventListener('pointerdown', (e) => {
            game.money += (1 * game.multi); refresh();
        });
        function showPage(p) {
            ['shop','rank','spin','rb'].forEach(pg => {
                document.getElementById('page-'+pg).style.display = (pg === p) ? 'block' : 'none';
                document.getElementById('t-'+pg).classList.remove('active');
            });
            document.getElementById('t-'+p).classList.add('active');
        }
    </script>
</body>
</html>
